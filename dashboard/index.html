<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes 戰情室 Monitor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a14;--card:#0a1628;--border:#1a2a44;--accent:#00b4ff;--green:#00ff88;--yellow:#ffaa00;--red:#ff3344;--text:#c8d6e5;--text-dim:#5a6a7a;--font:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,180,255,0.015) 2px,rgba(0,180,255,0.015) 4px);pointer-events:none;z-index:9999}
.container{max-width:1400px;margin:0 auto;padding:0 24px 40px}

/* Top Status Bar */
.top-bar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#060d1a 0%,#0a1628 100%);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.top-left{display:flex;align-items:center;gap:16px}
.top-title{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px}
.status-indicator{display:flex;align-items:center;gap:8px}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green),0 0 20px rgba(0,255,136,0.3);animation:pulse-glow 2s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px var(--green),0 0 20px rgba(0,255,136,0.3)}50%{box-shadow:0 0 16px var(--green),0 0 40px rgba(0,255,136,0.5)}}
.status-text{font-size:13px;color:var(--green);font-weight:500}
.top-right{display:flex;align-items:center;gap:20px}
.clock{font-size:22px;font-weight:600;color:var(--accent);letter-spacing:1px}
.stat-pill{font-size:12px;color:var(--text-dim);background:rgba(0,180,255,0.08);padding:4px 12px;border-radius:12px;border:1px solid rgba(0,180,255,0.2)}

/* Section headers */
.section-title{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title::before{content:'▸';color:var(--green)}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:16px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all 0.3s;position:relative;overflow:hidden}
.kpi-card:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(0,180,255,0.15)}
.kpi-card .kpi-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.kpi-card .kpi-value{font-size:36px;font-weight:700}
.kpi-card .kpi-sub{font-size:11px;color:var(--text-dim);margin-top:4px}
.kpi-green .kpi-value{color:var(--green)}
.kpi-accent .kpi-value{color:var(--accent)}
.kpi-yellow .kpi-value{color:var(--yellow)}
.kpi-red .kpi-value{color:var(--red)}

/* Surge Sites Table */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filter-btn{padding:6px 14px;font-size:11px;font-family:var(--font);background:rgba(0,180,255,0.06);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.filter-btn:hover{background:rgba(0,180,255,0.12);color:var(--text)}
.filter-btn.active{background:rgba(0,180,255,0.15);border-color:var(--accent);color:var(--accent)}
.search-box{flex:1;min-width:200px;max-width:360px;padding:6px 12px;font-size:12px;font-family:var(--font);background:#0a1220;border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;transition:border-color 0.2s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text-dim)}
.site-count{font-size:11px;color:var(--text-dim);margin-left:auto}
.sites-table-wrap{max-height:480px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:var(--card)}
.sites-table{width:100%;border-collapse:collapse;font-size:12px}
.sites-table thead{position:sticky;top:0;z-index:10}
.sites-table th{background:#0d1a2e;padding:10px 12px;text-align:left;color:var(--accent);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.sites-table td{padding:8px 12px;border-bottom:1px solid rgba(26,42,68,0.5);vertical-align:middle}
.sites-table tr:hover td{background:rgba(0,180,255,0.04)}
.sites-table a{color:var(--accent);text-decoration:none}
.sites-table a:hover{text-decoration:underline}
.http-dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle}
.http-200{background:var(--green);box-shadow:0 0 6px var(--green)}
.cat-tag{font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:0.5px;white-space:nowrap}
.cat-system{background:rgba(0,180,255,0.12);color:var(--accent);border:1px solid rgba(0,180,255,0.3)}
.cat-personal{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.25)}
.cat-verify{background:rgba(255,170,0,0.1);color:var(--yellow);border:1px solid rgba(255,170,0,0.25)}
.cat-macmini{background:rgba(170,100,255,0.1);color:#aa64ff;border:1px solid rgba(170,100,255,0.25)}
.cat-test{background:rgba(255,51,68,0.1);color:var(--red);border:1px solid rgba(255,51,68,0.25)}
.cat-other{background:rgba(200,214,229,0.08);color:var(--text-dim);border:1px solid rgba(200,214,229,0.15)}
.new-badge{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--red);color:#fff;font-weight:600;letter-spacing:0.5px;margin-left:4px}

/* Schedule Grid */
.schedule-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.3s;position:relative}
.day-card:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(0,180,255,0.12);transform:translateY(-2px)}
.day-card.pass{border-left:3px solid var(--green)}
.day-card.warn{border-left:3px solid var(--yellow)}
.day-num{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.day-title{font-size:13px;font-weight:600;margin:6px 0 4px;color:var(--text)}
.day-skills{font-size:10px;color:var(--text-dim);line-height:1.5}
.day-status{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%}
.day-status.pass{background:var(--green);box-shadow:0 0 8px var(--green)}
.day-status.warn{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,10,20,0.85);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-box{background:#0c1a30;border:1px solid var(--accent);border-radius:16px;padding:32px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 0 40px rgba(0,180,255,0.2);position:relative}
.modal-close{position:absolute;top:12px;right:16px;font-size:24px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font)}
.modal-close:hover{color:var(--accent)}
.modal-day{font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.modal-title{font-size:20px;font-weight:700;margin:8px 0 16px;color:var(--text)}
.modal-skill-list{list-style:none}
.modal-skill-list li{padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-skill-name{color:var(--accent);font-size:13px}
.modal-skill-zh{color:var(--text-dim);font-size:11px}

/* Category Readiness */
.cat-bars{display:flex;flex-direction:column;gap:14px}
.cat-bar-row{display:flex;align-items:center;gap:12px}
.cat-bar-label{font-size:11px;min-width:80px;text-align:right;color:var(--text-dim)}
.cat-bar-track{flex:1;height:20px;background:#0a1220;border-radius:4px;overflow:hidden;position:relative;border:1px solid var(--border)}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:600;color:#050a14}
.cat-bar-pct{font-size:11px;min-width:36px;color:var(--text)}

/* Radar */
.radar-wrap{display:flex;justify-content:center;padding:20px 0}
.radar-svg{max-width:400px;width:100%}

/* Skill Matrix */
.skill-grid{display:flex;flex-wrap:wrap;gap:8px}
.skill-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;transition:all 0.2s;display:flex;flex-direction:column;gap:2px}
.skill-chip:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(0,180,255,0.15)}
.skill-chip .skill-name{font-size:11px;color:var(--accent)}
.skill-chip .skill-zh{font-size:9px;color:var(--text-dim)}
.skill-chip.verified{border-left:2px solid var(--green)}
.skill-chip.unverified{border-left:2px solid var(--yellow)}

/* System Log */
.log-box{background:#020810;border:1px solid var(--border);border-radius:10px;padding:16px;max-height:320px;overflow-y:auto;font-size:11px;line-height:1.8;color:var(--green)}
.log-box .log-ts{color:var(--text-dim)}
.log-box .log-ok{color:var(--green)}
.log-box .log-warn{color:var(--yellow)}
.log-box .log-line{margin-bottom:2px}

/* Footer */
.footer{text-align:center;padding:32px 0 24px;border-top:1px solid var(--border);margin-top:40px}
.footer .ft{font-size:11px;color:var(--text-dim);letter-spacing:1px}
.footer .ft-title{color:var(--accent);font-weight:600;font-size:13px;margin-bottom:8px}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a1220}
::-webkit-scrollbar-thumb{background:#1a2a44;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* Responsive */
@media(max-width:768px){
  .top-bar{flex-direction:column;align-items:flex-start}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .schedule-grid{grid-template-columns:repeat(2,1fr)}
  .filter-bar{flex-direction:column}
}
</style>
</head>

// ===== CLASSIFY SITE =====
function classifySite(name) {
  if (/^hermes-/.test(name) || /^julia-/.test(name)) {
    if (/hermes-skill-verify/.test(name) || /^julia-skill-verify/.test(name)) return 'verify';
    if (/day\d+-report/.test(name)) return 'verify';
    return 'system';
  }
  if (/^jeff-/.test(name)) return 'personal';
  if (/^mac-mini-/.test(name)) return 'macmini';
  if (/^test-/.test(name)) return 'test';
  if (/^day\d+-report/.test(name)) return 'verify';
  return 'other';
}

const CAT_LABELS = {system:'系統工具',personal:'個人專案',verify:'技能驗證',macmini:'Mac Mini',test:'測試',other:'其他'};
const CAT_CSS = {system:'cat-system',personal:'cat-personal',verify:'cat-verify',macmini:'cat-macmini',test:'cat-test',other:'cat-other'};

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m+':'+s;
}
setInterval(updateClock, 1000);

// ===== SURGE SITES TABLE =====
let currentFilter = 'all';
let currentSearch = '';

function renderSites() {
  const tbody = document.getElementById('sitesTbody');
  let filtered = SURGE_SITES.filter(s => {
    const cat = classifySite(s.name);
    if (currentFilter !== 'all' && cat !== currentFilter) return false;
    if (currentSearch && !s.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
    return true;
  });
  document.getElementById('siteCount').textContent = filtered.length + ' 站點';
  tbody.innerHTML = filtered.map(s => {
    const cat = classifySite(s.name);
    const catLabel = CAT_LABELS[cat] || cat;
    const catCss = CAT_CSS[cat] || 'cat-other';
    const ageStr = s.age <= 3 ? s.age + '天' : s.age + '天';
    const newBadge = s.is_new ? '<span class="new-badge">NEW</span>' : '';
    return `<tr>
      <td>${s.name}${newBadge}</td>
      <td><a href="https://${s.name}.surge.sh" target="_blank">${s.name}.surge.sh</a></td>
      <td>${ageStr}</td>
      <td><span class="http-dot http-200"></span> ${s.status}</td>
      <td><span class="cat-tag ${catCss}">${catLabel}</span></td>
      <td></td>
    </tr>`;
  }).join('');
}

// ===== RADAR CHART =====
const radarCats = ['AGENTS','PROD','SW-DEV','MLOPS','RESEARCH','CREATIVE','MEDIA','GITHUB'];
const radarZh = ['代理系統','生產力','軟體開發','ML維運','研究','創意','媒體','GitHub'];
function drawRadar() {
  const svg = document.getElementById('radarSvg');
  const cx = 200, cy = 200, r = 150;
  const n = radarCats.length;
  let html = '';
  // Background circles
  for (let i = 5; i >= 1; i--) {
    const ri = r * i / 5;
    html += `<circle cx="${cx}" cy="${cy}" r="${ri}" fill="none" stroke="#1a2a44" stroke-width="1"/>`;
  }
  // Axes
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    html += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#1a2a44" stroke-width="1"/>`;
  }
  // Data polygon
  const points = radarCats.map((cat, i) => {
    const total = catSkillCount[cat] || 0;
    const verified = catSkillVerified[cat] || 0;
    const pct = total > 0 ? verified / total : 0;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * pct * Math.cos(angle);
    const y = cy + r * pct * Math.sin(angle);
    return `${x},${y}`;
  }).join(' ');
  html += `<polygon points="${points}" fill="rgba(0,180,255,0.15)" stroke="#00b4ff" stroke-width="2"/>`;
  // Dots + labels
  radarCats.forEach((cat, i) => {
    const total = catSkillCount[cat] || 0;
    const verified = catSkillVerified[cat] || 0;
    const pct = total > 0 ? verified / total : 0;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * pct * Math.cos(angle);
    const y = cy + r * pct * Math.sin(angle);
    html += `<circle cx="${x}" cy="${y}" r="4" fill="#00b4ff"/>`;
    const lx = cx + (r + 28) * Math.cos(angle);
    const ly = cy + (r + 28) * Math.sin(angle);
    html += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#c8d6e5" font-size="10" font-family="JetBrains Mono,monospace">${radarZh[i]}</text>`;
  });
  svg.innerHTML = html;
}
drawRadar();
